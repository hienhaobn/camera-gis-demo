# Nginx Configuration for GIS Camera Monitoring Platform (Offline deployment)
# Save this to /etc/nginx/conf.d/gis-platform.conf on your production server

server {
    listen 80;
    server_name _;
    
    # Redirect HTTP to HTTPS (BẮT BUỘC cho bảo mật nội bộ)
    # Uncomment lines below to enable auto HTTPS redirect:
    # return 301 https://$host$request_uri;
}

server {
    # Cấu hình HTTPS (Bắt buộc theo yêu cầu Security LAN)
    listen 443 ssl;
    server_name _;

    # Đường dẫn tới SSL Certificate của mạng nội bộ (Self-signed hoặc Internal CA)
    ssl_certificate /etc/ssl/certs/gis-platform.crt;
    ssl_certificate_key /etc/ssl/private/gis-platform.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ────────────────────────────────────────────────────────────────
    # Gzip Compression (Tối ưu hóa băng thông truyền tải vector tiles)
    # ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html text/css text/javascript
        application/javascript application/json
        application/x-protobuf
        application/vnd.mapbox-vector-tile
        image/svg+xml;

    # Endpoint kiểm tra trạng thái hoạt động (Health Check)
    location /health {
        access_log off;
        return 200 '{"status":"ok","time":"$time_local"}';
        add_header Content-Type application/json;
    }

    # ────────────────────────────────────────────────────────────────
    # 1. React Frontend App (Static assets build từ Vite)
    # ────────────────────────────────────────────────────────────────
    location / {
        root /var/www/gis-app/dist;
        try_files $uri $uri/ /index.html;
        
        # HTML — không cache (để luôn load code mới nhất khi deploy)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        
        # JS/CSS/Fonts — cache vĩnh viễn (do Vite đã hash tên file)
        location ~* \.(js|css|woff2?)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ────────────────────────────────────────────────────────────────
    # 2. PMTiles Map Tiles (Hỗ trợ HTTP Range Requests cho Protomaps)
    # ────────────────────────────────────────────────────────────────
    location /map/tiles/ {
        alias /data/map/tiles/;
        # RẤT QUAN TRỌNG: Phải bật byte-range để Client đọc file PMTiles mà không cần tải hết file
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=86400"; # Cache 24 giờ trên client
    }

    # ────────────────────────────────────────────────────────────────
    # 3. Map Styles (Positron & Dark)
    # ────────────────────────────────────────────────────────────────
    location /map/styles/ {
        alias /data/map/styles/;
        add_header Cache-Control "public, max-age=3600"; # Cache 1 giờ
        types { application/json json; }
    }

    # ────────────────────────────────────────────────────────────────
    # 4. Map Fonts (Glyphs PBF)
    # ────────────────────────────────────────────────────────────────
    location /map/fonts/ {
        alias /data/map/fonts/;
        add_header Cache-Control "public, max-age=604800"; # Cache 7 ngày
        types { application/x-protobuf pbf; }
    }

    # ────────────────────────────────────────────────────────────────
    # 5. Map Sprites (Icons)
    # ────────────────────────────────────────────────────────────────
    location /map/sprites/ {
        alias /data/map/sprites/;
        add_header Cache-Control "public, max-age=604800"; # Cache 7 ngày
    }

    # ────────────────────────────────────────────────────────────────
    # 6. Natural Earth Raster (z0-z6)
    # ────────────────────────────────────────────────────────────────
    location /map/ne/ {
        alias /data/map/ne/;
        add_header Cache-Control "public, max-age=604800"; # Cache 7 ngày
    }

    # ────────────────────────────────────────────────────────────────
    # Security Headers (Đạt chuẩn Audit bảo mật hệ thống thông tin)
    # ────────────────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' blob:;" always;
}
